<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flex End Example</title>
    <style>
        .flex-container {
            display: flex;
            justify-content: flex-end;
            gap: 50px;
            padding: 20px;
            border: 1px solid #ccc;
            background: #f9f9f9;
        }
        .flex-box {
            padding: 10px 15px;
            background: #4a90e2;
            color: white;
            border-radius: 4px;
        }
    </style>
</head>
<body>
    <h2>Flex container with justify-center: flex-end</h2>

    <div class="flex-container">
        <div class="flex-box">Box 1</div>
        <div class="flex-box">Box 2</div>
        <div class="flex-box">Box 3</div>
    </div>
    
</body>
</html>
