<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Navbar with space-evenly</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: Arial, sans-serif;
        }

        .navbar {
            display: flex;
            align-items: center;
            justify-content: space-evenly;
            background: #222;
            padding: 12px 16px;
            width: 100%;
        }

        .logo {
            color: #fff;
            font-size: 20px;
            font-weight: bold;
            margin: 0;
        }

        .nav-links {
            display: flex;
            list-style: none;
            gap: 0;
            margin: 0;
        }

        .nav-links a {
            color: #ddd;
            text-decoration: none;
            padding: 10px 16px;
            display: block;
            transition: color 0.2s;
        }

        .nav-links a:hover {
            color: #fff;
        }

        .nav-links {
            flex-direction: column;
            width: 100%;
            text-align: center;
            margin: 12px;
        }

        .nav-links a {
            padding: 20px;
        }
    </style>
</head>

<body>

    <nav class="navbar">
        <div class="logo">MySite</div>
        <ul class="nav-links">
            <li><a href="home">Home</a></li>
            <li><a href="about">About</a></li>
            <li><a href="services">Services</a></li>
            <li><a href="contact">Contact</a></li>
        </ul>
    </nav>
    <div style="padding: 40px; color: #333;">
        <h1>Page content</h1>
        <p>Your content page here</p>
    </div>

</body>

</html>
