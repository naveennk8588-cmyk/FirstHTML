<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Space Around Navigation</title>
    <style>
        .nav-container {
            display: flex;
            justify-content: space-around;
            padding: 10px 20px;
            background: #333;
        }

        .nav-box {
            color: white;
            text-decoration: none;
            padding: 8px 12px;
            border-radius: 4px;
        }

        .nav-box:hover {
            background: #555;
        }
    </style>


</head>

<body>
    <nav class="nav-container">
        <a class="nav-box" href="#">Home</a>
        <a class="nav-box" href="#">About</a>
        <a class="nav-box" href="#">Product</a>
        <a class="nav-box" href="#">Contact</a>
    </nav>

</body>

</html>
