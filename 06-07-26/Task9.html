<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Header with Logo Left and Menu Right</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: Arial, sans-serif;
            background: #f5f5f5;
        }

        header {
            background: #4486b8;
            padding: 0 20px;
        }

        .header-container {
            display: flex;
            align-items: center;
            justify-content: space-between;
            max-width: 1200px;
            margin: 0 auto;
            height: 60px;
        }

        .logo a {
            color: #fff;
            font-size: 22px;
            text-decoration: none;
            font-weight: bold;
        }

        .logo img {
            height: 40px;
            vertical-align: middle;
        }

        .nav-menu ul {
            list-style: none;
            display: flex;
            gap: 20px;
        }

        .nav-menu a {
            color: #ddd;
            text-decoration: none;
            padding: 8px 12px;
            display: block;
            transition: color 0.2s;
        }

        .nav-menu a:hover {
            color: #fff;
        }

        @media (max-width: 600px) {
            .header-container {
                flex-direction: column;
                height: auto;
                padding: 10px 0;
            }

            .nav-menu ul {
                margin-top: 10px;
                gap: 10px;
            }

            .nav-menu a {
                padding: 6px 10px;
            }
        }
    </style>
</head>

<body>
    <header>
        <div class="header-container">
            <div class="logo">
                <a href="#home">MySite</a>
            </div>

            <nav class="nav-menu">
                <ul>
                    <a href="#home">Home</a></li>
                    <a href="#about">About</a></li>
                    <a href="#services">Services</a></li>
                    <a href="#contact">Contact</a></li>
                </ul>
            </nav>
        </div>
    </header>

    <div style="padding: 40px; color: #333;">
        <h1>Page content</h1>
        <p>Your main content goes here.</p>
    </div>

</body>

</html>
