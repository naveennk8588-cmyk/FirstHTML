<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Centered Login Form</title>
    <style>
        * {
            margin: 0;
            padding-inline: 0;
            box-sizing: border-box;
        }

        body {
            font-family: Arial, sans-serif;
            background: #f5f5f5;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background-color: #8cca56;
        }

        .login-card {
            display: flex;
            flex-direction: column;
            background: #fff;
            padding: 32px 28px;
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0, 1);
            width: 100%;
            max-width: 360px;
            justify-content: center;
            align-items: center;
            text-align: center;
        }

        .login-card h2 {
            margin-bottom: 20px;
            color: #333;
        }

        .login-card .field {
            margin-bottom: 14px;
            width: 100%;
        }

        .login-card label {
            display: block;
            margin-bottom: 6px;
            font-size: 14px;
            color: #555;
        }

        .login-card input {
            width: 100%;
            padding: 10px 12px;
            border-radius: 4px;
            font-size: 14px;
        }

        .login-card input:focus {
            outline: none;
            border-color: #4a90d9;
        }

        .login-card button {
            width: 100%;
            padding: 10px;
            background: #4a90d9;
            color: #fff;
            border: none;
            border-radius: 4px;
            font-size: 15px;
            cursor: pointer;
        }

        .login-card button:hover {
            background: #3a7bc8;
        }
    </style>
</head>

<body>
    <div class="login-card">
        <h2>Login</h2>
        <form>
            <div class="field">
                <label for="email">Email</label>
                <input type="email" id="email" name="email" placeholder="your@email.com" required>
            </div>
            <div class="field">
                <label for="password">Password</label>
                <input type="password" id="password" name="password" placeholder="Your password" required>
            </div>
            <button type="submit">Sign In</button>
        </form>
    </div>


</body>

</html>
