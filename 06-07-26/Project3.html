<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Product Grid Header</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: Arial, sans-serif;
            background: #f9f9f9;
            color: #333;
        }


        .page-header {
            background: #fff;
            border-bottom: 1px solid #ddd;
            padding: 16px 20px;
        }

        .header-container {
            display: flex;
            align-items: center;
            justify-content: space-between;
            max-width: 1200px;
            margin: 0 auto;
        }


        .header-title {
            font-size: 24px;
            font-weight: bold;
            color: #222;
        }


        .header-filters {
            display: flex;
            align-items: center;
            gap: 12px;

        }

        .filter-group {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .filter-group label {
            font-size: 14px;
            color: #555;
        }

        .filter-group select {
            padding: 6px 10px;
            border: 1px solid #ccc;
            border-radius: 4px;
            font-size: 14px;
            background: #fff;
        }

        .btn {
            padding: 6px 12px;
            border: none;
            border-radius: 4px;
            font-size: 14px;
            cursor: pointer;
        }

        .btn-primary {
            background: #4a90d9;
            color: #fff;
        }

        .btn-primary:hover {
            background: #3a7bc8;
        }


        .content {
            max-width: 1200px;
            margin: 24px auto;
            padding: 0 20px;
        }

        .content h2 {
            margin-bottom: 16px;
            color: #a40909;
        }


        @media (max-width: 600px) {
            .header-container {
                flex-direction: column;
                align-items: flex-start;
                gap: 12px;
            }

            .header-filters {
                width: 100%;
                justify-content: space-between;
            }
        }
    </style>
</head>

<body>
    <header class="page-header">
        <div class="header-container">

            <h1 class="header-title">All Products</h1>


            <div class="header-filters">
                <div class="filter-group">
                    <label for="category">Category:</label>
                    <select id="category">
                        <option value="">All</option>
                        <option value="electronics">Electronics</option>
                        <option value="clothing">Clothing</option>
                        <option value="home">Home</option>
                    </select>
                </div>

                <div class="filter-group">
                    <label for="sort">Sort by:</label>
                    <select id="sort">
                        <option value="popular">Most Popular</option>
                        <option value="price-low">Price: Low to High</option>
                        <option value="price-high">Price: High to Low</option>
                    </select>
                </div>

                <button class="btn btn-primary">Apply Filters</button>
            </div>
        </div>
    </header>

    <div class="content">
        <h2>Product Grid</h2>
        <p>Your product grid goes here.</p>
    </div>

</body>

</html>
