<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vertical Center with align-items</title>
    <style>
        .container {
            display: flex;
            height: 100vh;
            align-items: center;
            gap: 16px;
            background: #f0f0f0;
            padding: 20px;
        }
        .box {
            background: #4a90d9;
            color: white;
            padding: 16px 24px;
            border-radius: 6px;
            font-size: 16px;
        }
    </style>

</head>
<body>

    <div class="container">
        <div class="box">Box 1</div>
        <div class="box">Box 2</div>
        <div class="box">Box 3</div>
    </div>
    
</body>
</html>
