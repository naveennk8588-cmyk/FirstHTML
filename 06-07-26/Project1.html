<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Modern Navbar</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: Arial, sans-serif;
            background: #f5f5f5;
        }

        .navbar {
            background: #962c1a;
            color: #fff;
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .nav-container {
            display: flex;
            align-items: center;
            justify-content: space-between;
            max-width: 1200px;
            margin: 0 auto;
            height: 60px;
            padding: 0 16px;
        }

        .logo a {
            color: #fff;
            font-size: 22px;
            font-weight: bold;
            text-decoration: none;
        }

        .nav-menu {
            display: flex;
            align-items: center;
            flex: 1;
            justify-content: center;
        }

        .nav-menu ul {
            list-style: none;
            display: flex;
            gap: 24px;
        }

        .nav-menu a {
            color: #ddd;
            text-decoration: none;
            padding: 8px 0;
            transition: color 0.2s;
        }

        .nav-menu a:hover {
            color: #fff;
        }

        .nav-actions {
            display: flex;
            align-items: center;
        }

        .nav-btn {
            background: #4a90d9;
            color: #fff;
            border: none;
            padding: 8px 16px;
            border-radius: 6px;
            font-size: 14px;
            cursor: pointer;
            transition: background 0.2s;
        }

        .nav-btn:hover {
            background: #3a7bc8;
        }

        @media (max-width: 600px) {
            .nav-container {
                flex-direction: column;
                height: auto;
                padding: 10px 16px;
            }

            .nav-menu ul {
                margin-top: 10px;
                gap: 16px;
            }

            .nav-actions {
                margin-top: 10px;
            }
        }
    </style>
</head>

<body>
    <nav class="navbar">
        <div class="nav-container">
            <div class="logo">
                <a href="#home">My Brand</a>
            </div>

            <div class="nav-menu">
                <ul>
                    <a href="#home">Home</a></li>
                    <a href="#about">About</a></li>
                    <a href="#services">Services</a></li>
                    <a href="#contact">Contact</a></li>
                </ul>
            </div>


            <div class="nav-actions">
                <button class="nav-btn">Get Started</button>
            </div>
        </div>
    </nav>

    <div style="padding: 40px; color: #333;">
        <h1>Page Content</h1>
        <p>Your main content goes here.</p>
    </div>

</body>

</html>
