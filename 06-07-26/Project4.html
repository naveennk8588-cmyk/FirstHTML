<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard Header Layout</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: Arial, sans-serif;
            background: #f5f5f5;
            color: #333;
        }

       
        .dashboard-header {
            background: #222;
            color: #fff;
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .header-container {
            display: flex;
            align-items: center;
            justify-content: space-between;
            max-width: 1200px;
            margin: 0 auto;
            height: 60px;
            padding: 0 16px;
        }

        
        .logo {
            display: flex;
            align-items: center;
            font-size: 20px;
            font-weight: bold;
        }

        .logo a {
            color: #fff;
            text-decoration: none;
        }

       
        .search-area {
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            max-width: 400px;
            margin: 0 16px;
        }

        .search-form {
            display: flex;
            width: 100%;
            background: #333;
            border-radius: 6px;
            padding: 4px 8px;
        }

        .search-form input {
            flex: 1;
            background: transparent;
            border: none;
            outline: none;
            color: #fff;
            padding: 6px 10px;
            font-size: 14px;
        }

        .search-form button {
            background: transparent;
            border: none;
            color: #ccc;
            cursor: pointer;
            padding: 6px 10px;
            font-size: 14px;
        }

        .search-form button:hover {
            color: #fff;
        }

        .profile {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .profile-name {
            color: #ddd;
            font-size: 14px;
        }

        .profile-icon {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            background: #4a90d9;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 16px;
            cursor: pointer;
        }

        .content {
            max-width: 1200px;
            margin: 24px auto;
            padding: 0 16px;
        }

        .content h2 {
            margin-bottom: 16px;
            color: #333;
        }

        @media (max-width: 500px) {
            .header-container {
                flex-direction: column;
                height: auto;
                padding: 10px 16px;
            }

            .search-area {
                margin: 10px 0;
                max-width: 100%;
            }
        }
    </style>
</head>

<body>
    <header class="dashboard-header">
        <div class="header-container">
            <div class="logo">
                <a href="#dashboard">DashUI</a>
            </div>

            
            <div class="search-area">
                <form class="search-form" action="#" method="get">
                    <input type="text" name="q" placeholder="Search..." aria-label="Search" />
                    <button type="submit" aria-label="Search"></button>
                </form>
            </div>

            <div class="profile">
                <span class="profile-name">Naveen</span>
                <div class="profile-icon" aria-label="Profile">P</div>
            </div>
        </div>
    </header>

    <div class="content">
        <h2>Dashboard</h2>
        <p>Your main dashboard content goes here.</p>
    </div>
</body>

</html>
