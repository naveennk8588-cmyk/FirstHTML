<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Profile</title>
</head>
<style>
    body {
       background-color: #3d8dcf;
        font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        display: flex;
        justify-content: center;
        margin: 20px;
    }
   .profile-card {
        background-color: #f9f5f5;
        border-radius: 10px;
        box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
        text-align: center;
        max-width: 400px;
        text-align: center;
    }
    .name {
        color: #655cdf;
        font-size: 24px;
        margin-bottom: 10px;
        text-transform: uppercase;
         margin: 10px;
    }
    .bio {
        color: #e37f0c;
        font-size: 16px;
        line-height: 1.5;
    }
    </style>
<body>
    <div class="profile-card">
        <h1 class="name">Naveen Kumar</h1>
       <div class="bio">
            <p>This is a simple paragraph about me.</p>
        </div>
    </div>
</body>
</html>
