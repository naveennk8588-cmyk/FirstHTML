<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Website Layout Template</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: Arial, sans-serif;
            background: #f4f7fb;
            color: #1f2937;
            min-height: 100vh;
        }

        .container {
            display: grid;
            grid-template-areas:
                "header header"
                "sidebar content"
                "footer footer";
            grid-template-columns: 240px 1fr;
            grid-template-rows: auto 1fr auto;
            gap: 12px;
            min-height: 100vh;
            padding: 12px;
        }

        .header {
            grid-area: header;
            background: #2563eb;
            color: white;
            padding: 20px;
            border-radius: 10px;
        }

        .sidebar {
            grid-area: sidebar;
            background: #7c3aed;
            color: white;
            padding: 20px;
            border-radius: 10px;
            min-height: 300px;
        }

        .content {
            grid-area: content;
            background: #0f766e;
            color: white;
            padding: 20px;
            border-radius: 10px;
            min-height: 300px;
        }

        .footer {
            grid-area: footer;
            background: #334155;
            color: white;
            padding: 20px;
            border-radius: 10px;
        }

        @media (max-width: 768px) {
            .container {
                grid-template-areas:
                    "header"
                    "sidebar"
                    "content"
                    "footer";
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>

<body>
    <div class="container">
        <header class="header">Header</header>
        <aside class="sidebar">Sidebar</aside>
        <main class="content">Content</main>
        <footer class="footer">Footer</footer>
    </div>
</body>

</html>
