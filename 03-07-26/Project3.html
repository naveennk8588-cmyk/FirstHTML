<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>My Docments</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: Arial, sans-serif;
            background: #f4f6f8;
            padding: 24px;
        }

        .products {
            display: flex;
            flex-wrap: wrap;
            gap: 20px;
            justify-content: center;
        }

        .product-card {
            flex: 1 1 220px;
            max-width: 260px;
            background: #fff;
            border-radius: 10px;
            overflow: hidden;
            box-shadow: 0 4px 14px rgba(0, 0, 0, 0.08);
        }

        .product-card img {
            width: 100%;
            height: 180px;
            object-fit: cover;
            display: block;
        }

        .product-info {
            padding: 16px;
        }

        .product-info h3 {
            font-size: 18px;
            margin-bottom: 8px;
            color: #222;
        }

        .product-info p {
            font-size: 14px;
            color: #666;
            margin-bottom: 12px;
        }

        .price {
            font-size: 16px;
            font-weight: bold;
            color: #e63946;
        }
    </style>
</head>

<body>
    <div class="products">
        <div class="product-card">
            <img src="https://picsum.photos/400/300?random=11" alt="Product 1" />
            <div class="product-info">
                <h3>Product One</h3>
                <p>Short product description.</p>
                <div class="price">₹999</div>
            </div>
        </div>

        <div class="product-card">
            <img src="https://picsum.photos/400/300?random=12" alt="Product 2" />
            <div class="product-info">
                <h3>Product Two</h3>
                <p>Short product description.</p>
                <div class="price">₹1,299</div>
            </div>
        </div>

        <div class="product-card">
            <img src="https://picsum.photos/400/300?random=13" alt="Product 3" />
            <div class="product-info">
                <h3>Product Three</h3>
                <p>Short product description.</p>
                <div class="price">₹799</div>
            </div>
        </div>

        <div class="product-card">
            <img src="https://picsum.photos/400/300?random=14" alt="Product 4" />
            <div class="product-info">
                <h3>Product Four</h3>
                <p>Short product description.</p>
                <div class="price">₹1,499</div>
            </div>
        </div>
    </div>
</body>

</html>
