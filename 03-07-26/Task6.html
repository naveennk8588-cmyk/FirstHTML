<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Document</title>
</head>
<style>
    * {
        margin: 0;
        padding: 0;
    }

    body {
        font-family: Arial, sans-serif;
    }

    .navbar {
        justify-content: space-between;
        align-items: center;
        padding: 10px 20px;
        background: #222;
        color: white;
    }

    .logo {
        font-size: 1.2rem;
        font-weight: bold;
    }

    .nav-link {
        display: flex;
        gap: 20px;
        list-style: none;
    }

    .nav-links a {
        color: white;
        text-decoration: none;
        padding: 8px 12px;
    }

    ,
    nav-links a:hover {
        background: #444;
        border-radius: 4px;
    }
</style>

<body>
    <nav class="navbar">
        <div class="logo">Mysite</div><br>
        <ul class="nav-links">
            <li><a href="#">Home</a></li>
            <li><a href="#">About</a></li>
            <li><a href="#">Services</a></li>
            <li><a href="#">Contact</a></li>
        </ul>
    </nav>
    <div style="padding: 20px;">
        <h1>Welcome</h1>
        <p>This is a simple page with a flexbox navbar.</p>
    </div>

</body>

</html>
