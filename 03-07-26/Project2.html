<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Docments</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            background: linear-gradient(135deg, #667eea, #764ba2);
            font-family: Arial, sans-serif;
        }

        .login-box {
            background: #fff;
            padding: 36px 40px;
            border-radius: 10px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
            width: 360px;
            max-width: 90%;
        }

        .login-box h2 {
            margin-bottom: 24px;
            text-align: center;
            font-size: 24px;
            color: #333;
        }

        .login-box label {
            display: block;
            margin-top: 16px;
            font-size: 14px;
            color: #555;
        }

        .login-box input {
            width: 100%;
            padding: 12px 14px;
            margin-top: 8px;
            border: 1px solid #ccc;
            border-radius: 6px;
            font-size: 14px;
        }

        .login-box input:focus {
            outline: none;
            border-color: #667eea;
        }

        .login-box button {
            margin-top: 24px;
            width: 100%;
            padding: 12px;
            border: none;
            background: #667eea;
            color: #fff;
            border-radius: 6px;
            font-size: 15px;
            cursor: pointer;
        }

        .login-box button:hover {
            background: #5568d3;
        }

        .footer-text {
            margin-top: 16px;
            text-align: center;
            font-size: 13px;
            color: #777;
        }
    </style>
</head>

<body>
    <div class="login-box">
        <h2>Login</h2>

        <form>
            <label for="username">Username</label>
            <input type="text" id="username" name="username" required />

            <label for="password">Password</label>
            <input type="password" id="password" name="password" required />

            <button type="submit">Sign In</button>
        </form>

        <p class="footer-text">
            Don’t have an account? <a href="#">Create one</a>
        </p>
    </div>
</body>
