<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Flex Container with 3 Boxes</title>
  <style>
    .flex-container {
      display: flex;
      gap: 16px;
      padding: 16px;
    }

    .box {
      flex: 1;                
      min-width: 100px;
      padding: 20px;
      background: #4a90d9;
      color: white;
      text-align: center;
      border-radius: 6px;
    }
  </style>
</head>
<body>
  <div class="flex-container">
    <div class="box">Box 1</div>
    <div class="box">Box 2</div>
    <div class="box">Box 3</div>
  </div>
</body>
</html>
