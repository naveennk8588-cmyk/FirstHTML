<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Vertical Center with align-items</title>
  <style>
    .container {
      display: flex;
      height: 100vh;          /* full viewport height */
      align-items: center;    /* vertical centering */
      gap: 16px;
      background: #f0f0f0;
      padding: 20px;
    }

    .item {
      background: #4a90d9;
      color: white;
      padding: 16px 24px;
      border-radius: 6px;
      font-size: 16px;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="item">Item 1</div>
    <div class="item">Item 2</div>
    <div class="item">Item 3</div>
  </div>
</body>
</html>
