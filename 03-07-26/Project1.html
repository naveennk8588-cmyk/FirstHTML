<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Docments</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: Arial, sans-serif;
        }


        .navbar {
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: #5fb44c;
            padding: 0 24px;
            height: 64px;
            position: sticky;
            top: 0;
            z-index: 1000;
        }


        .logo a {
            color: #a71c1c;
            font-size: 22px;
            font-weight: bold;
            text-decoration: none;
        }


        .menu {
            display: flex;
            list-style: none;
            gap: 20px;
        }

        .menu li a {
            color: #ccc;
            text-decoration: none;
            font-size: 15px;
            padding: 8px 10px;
            border-radius: 4px;
        }

        .menu li a:hover,
        .menu li a.active {
            background: #87c188;
            color: #fff;
        }


        @media (max-width: 768px) {
            .navbar {
                height: auto;
                padding: 10px 16px;
                flex-direction: column;
                align-items: flex-start;
            }

            .menu {
                margin-top: 10px;
                flex-wrap: wrap;
                gap: 10px;
            }
        }
    </style>
</head>

<body>
    <nav class="navbar">
        <div class="logo">
            <a href="#">Naveen</a>
        </div>

        <ul class="menu">
            ><a href="#" class="active">Home</a></li>
            ><a href="#">About</a></li>
            ><a href="#">Services</a></li>
            ><a href="#">Portfolio</a></li>
            ><a href="#">Contact</a></li>
        </ul>
    </nav>
</body>

</html>
