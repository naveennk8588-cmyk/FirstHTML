<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Document</title>
</head>
<body>
    <style>
    .box {
        width: 200px;
        height: 200px;
        background-color: #3498db;
        border: 2px solid black;
        padding: 20px;
        margin: 20px;
    }
    .solid { border-style: 3px solid red; }
    .dashed { border-style: 3px dashed blue; }
    .dotted { border-style: 3px dotted green; }

    .centered {
        width: 200px;
        height: 100px;
        border: 20px solid black;
        margin: 0 auto;
    }
    .profile-card {
        width: 250px;
        border-radius: 2px solid #333;
        border: 2px solid #0e5f22;
        padding: 20px;
        text-align: center;
        margin: 20px auto;
    }
    .image-placeholder {
        width: 100px;
        height: 100px;
        background-color: #0a034c;
        margin: 0 auto 15px auto;
    }
    </style>

    <div class="profile-card">
        <div class="image-placeholder"></div>
        <h2>Naveen Kumar</h2>
        <p>Web Developer</p>
    </div>
</body>
</html>
