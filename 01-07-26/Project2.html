<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Document</title>
</head>
<body>
    <style>
        .image-card {
            width: 300px;
            border: 1px solid #ccc;
            padding: 15px;
            margin: 20px;
            border-radius: 8px;
            font-family: arial, sans-serif;
            }

            .image-box {
                width: 100%;
                height: 180px;
                background-color: #ddd;
                display: flex;
                align-items: center;
                justify-content: center;
                color: #555;
                margin-bottom: 15px;
            }
            .card-title {
                margin: 0;
                font-size: 1.2rem;
            }
    </style>

    <div class="image-card">
        <div class="image-box">Image Placeholder</div>
        <h3 class="card-title">Beautiful Landscape</h3>
    </div>
</body>
</html>
