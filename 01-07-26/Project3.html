<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Document</title>
</head>
<body>
    <style>
  
  .product-card {
    width: 250px;
    border: 2px solid #ddd;
    padding: 20px;
    border-radius: 12px;
    font-family: 'Segoe UI', sans-serif;
    transition: transform 0.2s; 
  }

  
  .product-card:hover {
    border-color: #007bff;
    box-shadow: 0 5px 15px rgba(0,0,0,0.1);
  }

  .product-name {
    margin: 0 0 5px 0;
    font-size: 1.25rem;
  }

  .product-price {
    color: #28a745; 
    font-weight: bold;
    font-size: 1.1rem;
    display: block;
    margin-bottom: 10px;
  }

  .product-description {
    color: #666;
    font-size: 0.9rem;
    line-height: 1.4;
    margin: 0;
  }
</style>

<div class="product-card">
  <h2 class="product-name">Wireless Headphones</h2>
  <span class="product-price">$99.99</span>
  <p class="product-description">
    High-quality sound with active noise cancellation and 20-hour battery life.
  </p>
</div>
    
</body>
</html>
