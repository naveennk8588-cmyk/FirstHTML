<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <style>
        .profile-card {
            width: 300px;
            border: 2px solid #7a0a56;
            padding: 25px;
            margin: 50px auto;
            border-radius: 12px;
            font-family: sans-serif;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
        }
        .name {
            font-size: 1.5rem;
            margin: 10px 0 5px 0;
           
        }
        .role {
            color: #0d943c;
            font-weight: bold;
            text-transform: uppercase;
            font-size: 0.9rem;
        }
        .description {
            line-height: 1.6;
            color: #2a0101;
            margin-top: 15px;
        }
    </style>

 <div class="profile-card">
        <h2 class="name">Naveen Kumar</h2>
        <div class="role">Web Developer</div>
        <p class="description">
            Passionate about creating dynamic and user-friendly websites. Skilled in HTML, CSS, JavaScript, and various web development frameworks.
        </p>
    </div>
    
</body>
</html>
