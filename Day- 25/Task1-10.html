<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
   <h2>Registration Form</h2>

<form id="registerForm">

    <label>Name:</label><br>
    <input type="text" id="name">
    <p id="nameError"></p><br>

    <label>Email:</label><br>
    <input type="text" id="email">
    <p id="emailError"></p><br>

    <label>Password:</label><br>
    <input type="password" id="password">
    <p id="passwordError"></p><br>

    <label>Confirm Password:</label><br>
    <input type="password" id="confirmPassword">
    <p id="confirmError"></p><br>

    <label>Age:</label><br>
    <input type="number" id="age">
    <p id="ageError"></p><br>

    <label>Phone Number:</label><br>
    <input type="text" id="phone">
    <p id="phoneError"></p><br>

    <button type="submit">Register</button>

</form>

<h3 id="success"></h3>

<script>

document.getElementById("registerForm").addEventListener("submit", validateForm);

function validateForm(event){

    // Task 8 - prevent page refresh
    event.preventDefault();

    // Get values
    let name = document.getElementById("name").value.trim();
    let email = document.getElementById("email").value.trim();
    let password = document.getElementById("password").value;
    let confirmPassword = document.getElementById("confirmPassword").value;
    let age = document.getElementById("age").value;
    let phone = document.getElementById("phone").value.trim();

    // Clear previous messages
    document.getElementById("nameError").innerHTML = "";
    document.getElementById("emailError").innerHTML = "";
    document.getElementById("passwordError").innerHTML = "";
    document.getElementById("confirmError").innerHTML = "";
    document.getElementById("ageError").innerHTML = "";
    document.getElementById("phoneError").innerHTML = "";
    document.getElementById("success").innerHTML = "";

    let valid = true;

    // Task 1 - Empty Name
    if(name == ""){
        document.getElementById("nameError").innerHTML = "Name is required";
        valid = false;
    }

    // Task 2 - Email Validation
    if(email == ""){
        document.getElementById("emailError").innerHTML = "Email is required";
        valid = false;
    }
    else if(!email.includes("@") || !email.includes(".")){
        document.getElementById("emailError").innerHTML = "Enter a valid email";
        valid = false;
    }

    // Task 3 - Password Length
    if(password == ""){
        document.getElementById("passwordError").innerHTML = "Password is required";
        valid = false;
    }
    else if(password.length < 6){
        document.getElementById("passwordError").innerHTML = "Password must be at least 6 characters";
        valid = false;
    }

    // Task 10 - Confirm Password
    if(confirmPassword == ""){
        document.getElementById("confirmError").innerHTML = "Confirm Password is required";
        valid = false;
    }
    else if(password != confirmPassword){
        document.getElementById("confirmError").innerHTML = "Passwords do not match";
        valid = false;
    }

    // Task 4 - Age Validation
    if(age == ""){
        document.getElementById("ageError").innerHTML = "Age is required";
        valid = false;
    }
    else if(age < 18){
        document.getElementById("ageError").innerHTML = "Age must be 18 or above";
        valid = false;
    }

    // Task 5 - Phone Validation
    if(phone == ""){
        document.getElementById("phoneError").innerHTML = "Phone number is required";
        valid = false;
    }

    // Task 6 - Login Validation
    if(name != "" && password != ""){
        console.log("Login Validation Passed");
    }

    // Task 7 - Signup Validation
    if(name != "" && email != "" && password != ""){
        console.log("Signup Validation Passed");
    }

    // Success Message
    if(valid){
        document.getElementById("success").innerHTML = "Registration Successful";
    }

}

</script>
    
</body>
</html>
