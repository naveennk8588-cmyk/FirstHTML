<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MyBrand</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #f5f5f5;
    }

    .navbar {
      background: #111827;
      color: white;
      padding: 15px 20px;
      display: flex;
      align-items: center;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 10px;
      font-size: 20px;
      font-weight: bold;
    }

    .logo {
      width: 40px;
      height: 40px;
      border-radius: 50%;
      background: #06b6d4;
      display: grid;
      place-items: center;
      color: white;
      font-weight: bold;
    }

    .content {
      padding: 40px 20px;
      text-align: center;
    }
  </style>
</head>
<body>

  <header class="navbar">
    <div class="brand">
      <div class="logo">N</div>
      <span>MyBrand</span>
    </div>
  </header>

  <main class="content">
    <h1>Welcome to MyBrand</h1>
    <p>This is a simple branding example.</p>
  </main>

</body>
</html>
